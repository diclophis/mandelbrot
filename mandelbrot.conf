ServerName mandelbrot.bardin.haus
ErrorLog /dev/stdout
TransferLog /dev/stdout

<VirtualHost *:8080>
  ServerName https://mandelbrot.bardin.haus

  ServerAdmin webmaster@localhost
  DocumentRoot /var/www/html

  Header set Access-Control-Allow-Origin "*.bardin.haus"

  ErrorLog /dev/stdout
  TransferLog /dev/stdout
  KeepAlive Off
</VirtualHost>

<ifModule mpm_prefork_module>
    ServerLimit 4
    StartServers 5
    MaxClients 8
    MaxRequestWorkers 4
</IfModule>
